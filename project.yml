name: Mosaico
options:
  bundleIdPrefix: info.junz
  deploymentTarget:
    iOS: "17.0"
targets:
  Mosaico:
    type: application
    platform: iOS
    sources: [Sources]
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        NSPhotoLibraryAddUsageDescription: "Your edited photo is saved to your library as a new photo — the original is never touched."
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: info.junz.mosaico
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Q9SMJQ6VUX
